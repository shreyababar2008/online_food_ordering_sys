
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Food Ordering System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">FoodExpress</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menu</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="order.html">Order</a>
                    </li>

                    
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="bg-warning text-center p-5">
        <div class="container">
            <h1>Welcome to FoodExpress</h1>
            <p class="lead">Order Your Favorite Food Anytime, Anywhere</p>
            <a href="menu.html" class="btn btn-dark btn-lg">Order Now</a>
        </div>
    </section>

    <!-- Featured Dishes -->
    <section class="container my-5">
        <h2 class="text-center mb-4">Featured Dishes</h2>

        <div class="row">

            <div class="col-md-4">
                <div class="card">
                    <img src="pizza.jpg" class="card-img-top" alt="Pizza">
                    <div class="card-body text-center">
                        <h5 class="card-title">Pizza</h5>
                        <p>Delicious Cheese Pizza</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="burger.jpg" class="card-img-top" alt="Burger">
                    <div class="card-body text-center">
                        <h5 class="card-title">Burger</h5>
                        <p>Fresh Veg Burger</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <img src="pasta.jpg" class="card-img-top" alt="Pasta">
                    <div class="card-body text-center">
                        <h5 class="card-title">Pasta</h5>
                        <p>Creamy White Sauce Pasta</p>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3">
        <p>&copy; 2026 Online Food Ordering System</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
